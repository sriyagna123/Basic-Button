<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic JavaScript Examples</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
        }
        input {
            padding: 8px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <h1>Color Changing Button</h1>
    <button id="colorButton">Click me to change color</button>

    <h1>Greeting Alert</h1>
    <button id="greetButton">Show Greeting</button>

    <h1>Basic Calculator</h1>
    <input id="num1" type="number" placeholder="Enter first number">
    <input id="num2" type="number" placeholder="Enter second number">
    <button id="addBtn">Add</button>
    <p id="result"></p>

    <script src="script.js"></script>
</body>
</html>
